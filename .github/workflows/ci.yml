name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly 03:00 UTC — Stryker + supply-chain scan run on this trigger
    # so they don't block PRs.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build + unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Ambev.DeveloperEvaluation.sln

      - name: Build
        run: dotnet build Ambev.DeveloperEvaluation.sln --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format Ambev.DeveloperEvaluation.sln --verify-no-changes --no-restore --verbosity diagnostic

      - name: Unit tests
        run: |
          dotnet test tests/Ambev.DeveloperEvaluation.Unit/Ambev.DeveloperEvaluation.Unit.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=unit.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    name: integration tests (Testcontainers)
    runs-on: ubuntu-latest
    # Testcontainers needs a Docker socket; ubuntu-latest already provides it.
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Ambev.DeveloperEvaluation.sln

      - name: Build
        run: dotnet build Ambev.DeveloperEvaluation.sln --configuration Release --no-restore

      - name: Integration tests
        run: |
          dotnet test tests/Ambev.DeveloperEvaluation.Integration/Ambev.DeveloperEvaluation.Integration.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=integration.trx"

  migration-validate:
    name: validate EF migrations (idempotent script)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 8.0.10

      - name: Generate idempotent migration script
        run: |
          dotnet ef migrations script \
            --project src/Ambev.DeveloperEvaluation.ORM \
            --startup-project src/Ambev.DeveloperEvaluation.WebApi \
            --idempotent \
            --output migrations.sql
          test -s migrations.sql

      - name: Upload migration script
        uses: actions/upload-artifact@v4
        with:
          name: migrations-script
          path: migrations.sql

  supply-chain:
    name: dependency vulnerabilities + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Ambev.DeveloperEvaluation.sln

      - name: List vulnerable packages
        run: |
          dotnet list Ambev.DeveloperEvaluation.sln package --vulnerable --include-transitive > vulns.txt || true
          cat vulns.txt
          if grep -E "Critical" vulns.txt; then
            echo "::error::Critical vulnerability detected; fix before merge."
            exit 1
          fi

      - name: Install CycloneDX SBOM tool
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: dotnet CycloneDX Ambev.DeveloperEvaluation.sln --output sbom --json
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom

  mutation-testing:
    name: Stryker mutation testing (Domain + Application)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install Stryker
        run: dotnet tool install --global dotnet-stryker
      - name: Run Stryker
        run: dotnet stryker --config-file stryker-config.json --reporter "cleartext" --reporter "html"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: StrykerOutput

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
